title: "[Question] "
body:
  - type: markdown
    attributes:
      value: |
        Use this category for setup, configuration, database, AI, edition, and product-usage questions.

        Search existing Discussions and documentation first. For a reproducible software defect, use a Bug issue. Never post credentials, customer data, or vulnerability details here; report vulnerabilities privately at https://github.com/OtterMind/Chat2DB/security/advisories/new.
  - type: dropdown
    id: edition
    attributes:
      label: Chat2DB edition
      description: Local is a delivery mode, not a fourth edition.
      options:
        - Community
        - Pro
        - Enterprise
        - Not sure
    validations:
      required: true
  - type: dropdown
    id: delivery_mode
    attributes:
      label: Delivery mode
      options:
        - Desktop
        - Web
        - Docker
        - Local/offline delivery
        - Source development
        - Other or not sure
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Chat2DB version
      description: Use the exact version when available.
      placeholder: "For example: 5.3.0"
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Include the operating system and database type/version when relevant.
      placeholder: "For example: macOS 15, PostgreSQL 16"
    validations:
      required: true
  - type: textarea
    id: question
    attributes:
      label: Question
      description: Describe what you are trying to accomplish and where you are blocked.
    validations:
      required: true
  - type: textarea
    id: attempted
    attributes:
      label: What have you tried?
      description: Include documentation, commands, configuration, or workarounds already attempted.
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Sanitized logs or screenshots
      description: Remove passwords, API keys, tokens, private hostnames, customer data, and production SQL.
    validations:
      required: false
  - type: checkboxes
    id: confirmations
    attributes:
      label: Before posting
      options:
        - label: I searched existing Issues and Discussions for the same question.
          required: true
        - label: I removed secrets, private infrastructure details, and customer data.
          required: true
