name: Database compatibility bug
description: Report a database-specific connection, metadata, SQL, or editor problem
type: Bug
body:
  - type: markdown
    attributes:
      value: Do not include security vulnerability details in this public form.

  - type: markdown
    attributes:
      value: "## Environment"

  - type: dropdown
    id: edition
    attributes:
      label: Chat2DB Edition
      description: Select the edition where you can reproduce the problem.
      options:
        - Chat2DB Community
        - Chat2DB Local
        - Chat2DB Pro
    validations:
      required: true

  - type: input
    id: chat2db-version
    attributes:
      label: Chat2DB Version
      description: Enter the version shown in Chat2DB. For a source build, enter the commit SHA.
    validations:
      required: true

  - type: dropdown
    id: deployment
    attributes:
      label: Deployment
      description: Select how you run Chat2DB.
      options:
        - Web
        - Desktop
        - Docker
    validations:
      required: true

  - type: dropdown
    id: operating-system
    attributes:
      label: Operating System
      description: Select the operating system where the problem occurs.
      options:
        - Windows
        - macOS
        - Linux
        - Other
    validations:
      required: true

  - type: input
    id: operating-system-version
    attributes:
      label: Operating System Version
      description: Enter the exact version shown by your operating system.
    validations:
      required: true

  - type: dropdown
    id: database
    attributes:
      label: Database
      description: Select the database where the problem occurs.
      options:
        - MySQL
        - PostgreSQL
        - Oracle
        - SQL Server
        - ClickHouse
        - MariaDB
        - SQLite
        - H2
        - DB2
        - DM
        - Kingbase
        - OceanBase
        - Hive
        - Presto
        - MongoDB
        - Redis
        - Snowflake
        - Other
    validations:
      required: true

  - type: input
    id: database-version
    attributes:
      label: Database Version
      description: Enter the exact database server version.
      placeholder: "8.0.36"
    validations:
      required: true

  - type: input
    id: driver-version
    attributes:
      label: Driver Name and Version
      description: Enter the driver name and version if known. Otherwise, leave this blank.
      placeholder: "mysql-connector-j 8.0.33"

  - type: dropdown
    id: area
    attributes:
      label: Affected Area
      description: Select the Chat2DB area where the problem occurs.
      options:
        - Connection
        - Database tree and metadata
        - SQL execution or DDL
        - SQL editor
        - Data editor
        - Import or export
        - Other
    validations:
      required: true

  - type: markdown
    attributes:
      value: "## Problem and Reproduction"

  - type: textarea
    id: reproduction
    attributes:
      label: Minimal Reproduction
      description: Paste the smallest sanitized DDL, SQL, and steps that reproduce the problem.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: Describe what should happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: Describe what happens instead, including the exact error when available.
    validations:
      required: true

  - type: markdown
    attributes:
      value: "## Evidence"

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Paste relevant logs or errors. Remove passwords, tokens, connection strings, private URLs, and production data.
      render: shell

  - type: textarea
    id: additional-context
    attributes:
      label: Screenshots or Additional Context
      description: Attach screenshots or add context that helps explain the issue. Do not include sensitive data.

  - type: markdown
    attributes:
      value: "## Impact and Workaround"

  - type: dropdown
    id: impact
    attributes:
      label: Impact
      description: Choose the effect on your work, from data loss to a limited or cosmetic impact.
      options:
        - Data loss
        - Blocks startup or a core workflow
        - Degrades a core workflow
        - Limited or cosmetic impact
    validations:
      required: true

  - type: dropdown
    id: affected-scope
    attributes:
      label: Affected Scope
      description: Choose how broadly this problem affects the selected database.
      options:
        - All users of this database
        - A common database workflow
        - A specific configuration or query
        - Not sure
    validations:
      required: true

  - type: dropdown
    id: workaround
    attributes:
      label: Workaround
      description: Choose the best description of any temporary way to continue working.
      options:
        - No known workaround
        - A partial workaround exists
        - A reliable workaround exists
        - Not sure
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Submission Checklist
      options:
        - label: I reproduced this on the selected Chat2DB edition.
          required: true
        - label: I included a minimal sanitized reproduction.
          required: true
        - label: I searched existing issues for duplicates.
          required: true
